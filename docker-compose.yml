services:
  web:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "43000:3000"
    env_file:
      - .env.local
    environment:
      # Server-side reaches Supabase Kong directly on the Docker network
      SUPABASE_URL: "http://supabase_kong_gokind:8000"
    networks:
      - supabase_network_gokind
    restart: unless-stopped

networks:
  supabase_network_gokind:
    external: true